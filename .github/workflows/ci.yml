name: CI

on:
  push:
    branches: [main, "phase-4.2/**", "phase-4/**"]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: unit + integration tests ──────────────────────────────────────
  backend-tests:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('code/backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test suite
        run: python -m pytest -q --tb=short
        env:
          APP_ENV: dev
          JWT_SECRET: "ci-test-secret-not-used-in-prod"
          # DATABASE_URL is set by conftest.py to a temporary SQLite file.
          # LLM keys are not required — tests mock AI calls.

  # ── Frontend: type-check + build ───────────────────────────────────────────
  frontend-build:
    name: Frontend Build (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: code/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Placeholder URL at build time — real URL is baked in via Vercel env vars.
          NEXT_PUBLIC_API_BASE: "https://placeholder.railway.app"
